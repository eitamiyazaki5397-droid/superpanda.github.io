<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SUPER SNAKE</title>

<style>

body{
background:#111;
color:white;
text-align:center;
font-family:sans-serif;
}

canvas{
background:black;
border:3px solid white;
}

#overlay{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
background:rgba(0,0,0,0.85);
}

button{
font-size:20px;
padding:10px 25px;
margin-top:10px;
cursor:pointer;
}

</style>
</head>

<body>

<h1>🐍 SUPER SNAKE</h1>

<p>
スコア: <span id="score">0</span>
&nbsp;&nbsp;
ハイスコア: <span id="highscore">0</span>
</p>

<div style="position:relative;display:inline-block">

<canvas id="game" width="400" height="400"></canvas>

<div id="overlay">
<h2 id="message">SUPER SNAKE</h2>
<button onclick="startGame()">スタート</button>
</div>

</div>

<script>

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const overlay = document.getElementById("overlay");
const message = document.getElementById("message");

const grid = 20;

let snake;
let apple;
let score;
let count = 0;
let running = false;

let particles = [];

let highscore = localStorage.getItem("snakeHigh") || 0;
document.getElementById("highscore").textContent = highscore;

function init(){

snake={
x:160,
y:160,
dx:grid,
dy:0,
cells:[],
maxCells:4
};

apple={
x:320,
y:320
};

score=0;
document.getElementById("score").textContent=score;

particles=[];

}

function startGame(){

init();
running=true;
overlay.style.display="none";

}

function gameOver(){

running=false;

if(score>highscore){
highscore=score;
localStorage.setItem("snakeHigh",highscore);
document.getElementById("highscore").textContent=highscore;
}

message.textContent="ゲームオーバー！ スコア "+score;

overlay.style.display="flex";

alert("GAME OVER");

location.href = "index.html";

}

function random(min,max){
return Math.floor(Math.random()*(max-min))+min;
}

function createParticles(x,y){

for(let i=0;i<10;i++){

particles.push({
x:x,
y:y,
vx:(Math.random()-0.5)*4,
vy:(Math.random()-0.5)*4,
life:30
});

}

}

function loop(){

requestAnimationFrame(loop);

if(!running) return;

let speed = 8 - Math.floor(score/5);
if(speed < 2) speed = 2;

if(++count < speed) return;

count=0;

ctx.clearRect(0,0,canvas.width,canvas.height);

snake.x+=snake.dx;
snake.y+=snake.dy;

if(
snake.x<0 ||
snake.x>=canvas.width ||
snake.y<0 ||
snake.y>=canvas.height
){
gameOver();
return;
}

snake.cells.unshift({x:snake.x,y:snake.y});

if(snake.cells.length>snake.maxCells){
snake.cells.pop();
}

ctx.fillStyle="red";
ctx.fillRect(apple.x,apple.y,grid-1,grid-1);

snake.cells.forEach(function(cell,index){

ctx.fillStyle="hsl("+(index*30)+",100%,50%)";

ctx.fillRect(cell.x,cell.y,grid-1,grid-1);

if(cell.x===apple.x && cell.y===apple.y){

snake.maxCells++;

score++;
document.getElementById("score").textContent=score;

createParticles(apple.x,apple.y);

apple.x=random(0,20)*grid;
apple.y=random(0,20)*grid;

}

for(let i=index+1;i<snake.cells.length;i++){

if(cell.x===snake.cells[i].x &&
cell.y===snake.cells[i].y){

gameOver();

}

}

});

particles.forEach(function(p){

p.x+=p.vx;
p.y+=p.vy;
p.life--;

ctx.fillStyle="yellow";
ctx.fillRect(p.x,p.y,4,4);

});

particles=particles.filter(p=>p.life>0);

}

document.addEventListener("keydown",function(e){

if(!running) return;

if(e.key==="ArrowLeft" && snake.dx===0){
snake.dx=-grid;
snake.dy=0;
}

else if(e.key==="ArrowUp" && snake.dy===0){
snake.dy=-grid;
snake.dx=0;
}

else if(e.key==="ArrowRight" && snake.dx===0){
snake.dx=grid;
snake.dy=0;
}

else if(e.key==="ArrowDown" && snake.dy===0){
snake.dy=grid;
snake.dx=0;
}

});

init();
requestAnimationFrame(loop);

</script>

</body>
</html>
